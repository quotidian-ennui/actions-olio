name: Static Analysis

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  reviewdog:
    name: reviewdog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    outputs:
      dependabot_merge: ${{ steps.changes.outputs.dependabot_merge_any_changed }}
      default_updatecli: ${{ steps.changes.outputs.default_updatecli_any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          # fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      - name: Changed Files
        # Attempt to figure out what files have changed
        id: changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            workflows:
              - ".github/workflows/**"
            shellscripts:
              - "**/*.sh"
            dependabot_merge:
              - "dependabot-merge/**"
            default_updatecli:
              - "default-updatecli/**"
      # actionlint as of 1.6.26 only supports workflows (not resuable actions)
      # https://github.com/rhysd/actionlint/pull/366
      # https://github.com/rhysd/actionlint/issues/350
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        if: steps.changes.outputs.workflows_any_changed == 'true'
        with:
          reporter: github-pr-review
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_level: error
      - name: shellcheck
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        if: steps.changes.outputs.shellscripts_any_changed == 'true'
        with:
          reporter: github-pr-review
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_all_files_with_shebangs: "true"
          fail_level: error
      - name: shfmt
        uses: reviewdog/action-shfmt@c5e3ba7497c338866921924691aef4fa18bc1fe0 # v1.1.0
        if: steps.changes.outputs.shellscripts_any_changed == 'true'
        with:
          fail_on_error: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          shfmt_flags: -i 2

  dependabot_patch_merge:
    name: merge-untested-actions
    runs-on: ubuntu-latest
    needs:
      - reviewdog
    permissions:
      contents: write
    if: |
      (needs.reviewdog.outputs.dependabot_merge == 'true' ||
      needs.reviewdog.outputs.default_updatecli == 'true') &&
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]'
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: dispatch
        uses: ./pr-trigger
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event_type: "pr-untested-actions"

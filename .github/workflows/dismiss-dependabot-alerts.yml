name: dismiss-dependabot-alerts
on:
  workflow_dispatch:
  schedule:
    - cron: "15 06 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/dismiss-alerts.yml"
      - ".github/workflows/dismiss-dependabot-alerts.yml"
      - "dismiss-dependabot-alerts/action.yml"
      - "dismiss-dependabot-alerts/action.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dismiss-alerts:
    name: dismiss-alerts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Create Token"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.WORKFLOW_UPDATE_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name}}"
      - name: "Dismiss alerts"
        id: dismiss-alerts
        uses: ./dismiss-dependabot-alerts
        with:
          token: ${{ steps.app-token.outputs.token }}

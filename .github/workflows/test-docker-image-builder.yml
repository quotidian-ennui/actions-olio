name: test-docker-image-builder

on:
  push:
    branches:
      - main
    paths:
      - "docker-image-builder/**"
      - ".github/workflows/test-docker-image-builder.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docker-image-builder/**"
      - ".github/workflows/test-docker-image-builder.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-docker-image-builder:
    defaults:
      run:
        shell: bash
    name: test-docker-image-builder
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        docker_target: ["explict-cache", "nocache", "autocache", "local-cache"]
        include:
          - docker_target: explict-cache
            docker_image_name: ${{ github.repository_owner }}/test-docker-image-builder-cache
            caching: enabled
            cache_from: type=gha
            cache_to: type=gha,mode=min
          - docker_target: nocache
            docker_image_name: ${{ github.repository_owner }}/test-docker-image-builder-nocache
            caching: none
            cache_from:
            cache_to:
          - docker_target: autocache
            docker_image_name: ${{ github.repository_owner }}/test-docker-image-builder-auto
            caching: automatic
            cache_from:
            cache_to:
          - docker_target: local-cache
            docker_image_name: ${{ github.repository_owner }}/test-docker-image-builder-local
            caching: local
            cache_from:
            cache_to:
    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            dl-cdn.alpinelinux.org:443
            github.com:443
            production.cloudflare.docker.com:443
            raw.githubusercontent.com:443
            registry-1.docker.io:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: docker-image-builder
        id: docker
        uses: ./docker-image-builder
        with:
          registry_push: false
          load_locally: true
          dockerfile: docker-image-builder/Dockerfile.test
          image_platforms: linux/amd64
          enable_build_summary: false
          enable_build_record: false
          dockerhub_image_name: ${{ matrix.docker_image_name }}
          caching: ${{ matrix.caching }}
          cache_from: ${{ matrix.cache_from }}
          cache_to: ${{ matrix.cache_to }}
      - name: check outputs
        id: check_outputs
        env:
          DOCKER_LABELS: ${{ steps.docker.outputs.labels }}
          DOCKER_JSON: ${{ steps.docker.outputs.json }}
          DOCKER_TAGS: ${{ steps.docker.outputs.image_tags }}
          DOCKER_VERSION: ${{ steps.docker.outputs.version }}
        run: |
          if [[ -z "$DOCKER_TAGS" ]]; then
            echo "::error::image_tags not set by docker-image-builder"
            exit 1
          fi
          if [[ -z "$DOCKER_LABELS" ]]; then
            echo "::error::labels not set by docker-image-builder"
            exit 1
          fi
          if [[ -z "$DOCKER_VERSION" ]]; then
            echo "::error::version not set by docker-image-builder"
            exit 1
          fi
          if [[ -z "$DOCKER_JSON" ]]; then
            echo "::error::json not set by docker-image-builder"
            exit 1
          fi
      - name: Use the image
        id: docker_run
        # bash + curl installed as part of docker-image-builder/Dockerfile.test
        env:
          DOCKER_TAGS: ${{ steps.docker.outputs.image_tags }}
        run: |
          test_image=$(echo "$DOCKER_TAGS" | head -n 1 | cut -d' ' -f1)
          docker run --rm --entrypoint=bash "$test_image" \
            -c "curl -fSsL https://raw.githubusercontent.com/${{ github.repository }}/main/README.md"
      - name: Cleanup
        # Our work here is done, so cleanup
        id: cleanup
        if: success() || failure()
        continue-on-error: true
        env:
          DOCKER_TAGS: ${{ steps.docker.outputs.image_tags }}
        run: |
          mapfile -t image_tags <<< "$DOCKER_TAGS"
          for image in "${image_tags[@]}"; do
            echo "Deleting $image"
            docker rmi "$image" || true
          done

  notification:
    name: notification
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - test-docker-image-builder
    if: |
      github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: dispatch
        uses: ./pr-trigger
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event_type: "pr-docker-image-builder-test-success"

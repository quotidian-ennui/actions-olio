version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      - "/"
    open-pull-requests-limit: 20
    schedule:
      interval: "daily"
      time: "03:11"
      timezone: "Europe/London"
    rebase-strategy: disabled
    cooldown:
      default-days: 3
      exclude:
        - "quotidian-ennui/workflows-olio/*"
    allow:
      - dependency-type: all
    commit-message:
      prefix: "deps(ci): "
    groups:
      workflows-olio:
        patterns:
          - "quotidian-ennui/workflows-olio/*"

  - package-ecosystem: github-actions
    directories:
      - "commit-status-and-label"
      - "default-updatecli"
      - "dependabot-merge"
      - "docker-image-builder"
      - "pr-or-issue-comment"
      - "pr-trigger"
      - "repo-dispatch"
      - "dismiss-dependabot-alerts"
      - "setup-java-gradle"
    open-pull-requests-limit: 20
    rebase-strategy: disabled
    schedule:
      interval: "daily"
      time: "04:11"
      timezone: "Europe/London"
    allow:
      - dependency-type: all
    commit-message:
      prefix: "deps: "
    cooldown:
      default-days: 3
      exclude:
        - "quotidian-ennui/workflows-olio/*"
        - "quotidian-ennui/actions-olio/*"
    groups:
      workflows-olio:
        patterns:
          - "quotidian-ennui/workflows-olio/*"
    allow:
      - dependency-type: "all"

  - package-ecosystem: "gradle"
    directory: "setup-java-gradle/test"
    open-pull-requests-limit: 20
    rebase-strategy: disabled
    cooldown:
      default-days: 3
    schedule:
      interval: "daily"
      time: "04:23"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"
    groups:
      setup-java-test:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directories:
      - "src/test/docker-image-builder"
    open-pull-requests-limit: 20
    rebase-strategy: disabled
    cooldown:
      default-days: 3
    schedule:
      interval: "daily"
      time: "03:23"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"

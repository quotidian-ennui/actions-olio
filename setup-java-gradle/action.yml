name: setup-java-gradle
description: Setup java, gradle, and naively cache gradle directories

inputs:
  java-version:
    description: Which Java Version
    required: false
    default: "21"
  distribution:
    description: Which Java Distribution
    required: false
    default: "temurin"
  gradle-dependency-graph:
    description: Enable the gradle dependency graph
    required: false
    default: "false"
  writeable:
    description: Treat the cache as writeable
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
    - name: Setup Gradle
      id: setup_gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      with:
        gradle-version: wrapper
        dependency-graph: ${{ inputs.gradle-dependency-graph }}
        cache-disabled: true
    - name: ReadOnly Cache
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      if: inputs.writeable != 'yes' && inputs.writeable !='true'
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties','buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      id: rw-plugin-cache
      if: inputs.writeable == 'yes' || inputs.writeable =='true'
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties','buildSrc/**/Versions.kt', 'buildSrc/**/Dependencies.kt', 'gradle/*.versions.toml', '**/versions.properties') }}
        restore-keys: ${{ runner.os }}-gradle-
